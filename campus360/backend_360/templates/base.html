{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CRPES{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Move ALL common CSS here (sidebar, navbar, layout) */

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f3f4f6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .sidebar a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: #374151;
            margin-bottom: 8px;
        }

        .sidebar a.active {
            background: #2563eb;
            color: white;
            border-radius: 6px;
        }

        .main {
            flex: 1;
            padding: 30px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 12px;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>CRPES</h3>
            <li><a href="{% url 'dashboard' %}">📊 Dashboard</a></li>
            <li><a href="{% url 'blocks' %}"class="active">🏢 Campus Blocks</a></li>
            <li><a href="{% url 'classrooms' %}">🎓 Classrooms</a></li>
            <li><a href="{% url 'courses' %}">📚 Courses</a></li>
            <li><a href="{% url 'faculty' %}">👨‍🏫 Faculty</a></li>
            <li><a href="{% url 'students' %}">👥 Students</a></li>
            <li><a href="{% url 'analytics' %}" >📈 Analytics</a></li>
       
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="navbar">
            <h2>{% block page_title %}{% endblock %}</h2>

            <div>
                {{ request.user.username }}
                <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
            </div>
        </div>

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
